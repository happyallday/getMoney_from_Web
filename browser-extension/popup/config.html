<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福利助手 - 设置</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            padding: 20px;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 14px;
        }

        .settings-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            font-size: 18px;
            color: #2c3e50;
            margin-bottom: 20px;
            font-weight: bold;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #ecf0f1;
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .setting-label {
            flex: 1;
        }

        .setting-name {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 4px;
        }

        .setting-description {
            font-size: 12px;
            color: #7f8c8d;
        }

        .setting-control {
            margin-left: 20px;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #2ecc71;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .platform-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .platform-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .platform-card:hover {
            border-color: #3498db;
            transform: translateY(-2px);
        }

        .platform-card.active {
            border-color: #2ecc71;
            background: #f0fdf4;
        }

        .platform-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .platform-icon {
            font-size: 24px;
            margin-right: 8px;
        }

        .platform-name {
            font-weight: bold;
            color: #2c3e50;
        }

        .platform-status {
            font-size: 12px;
            color: #7f8c8d;
        }

        .user-info {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced6e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .encryption-notice {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 6px;
            padding: 10px;
            margin-top: 10px;
            font-size: 12px;
            color: #856404;
        }

        .btn {
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #2980b9;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-danger {
            background: #e74c3c;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .footer {
            text-align: center;
            color: white;
            font-size: 12px;
            margin-top: 20px;
            opacity: 0.8;
        }

        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <button class="back-button" onclick="goBack()">← 返回</button>

    <div class="container">
        <div class="header">
            <h1>🎁 福利助手设置</h1>
            <p>v0.1.0 | 合规福利获取助手</p>
        </div>

        <!-- 平台设置 -->
        <div class="settings-section">
            <div class="section-title">平台设置</div>
            <div class="platform-grid" id="platformGrid">
                <div class="platform-card" data-platform="mobile">
                    <div class="platform-header">
                        <span class="platform-icon">📱</span>
                        <span class="platform-name">中国移动</span>
                    </div>
                    <div class="platform-status">
                        <label class="toggle-switch">
                            <input type="checkbox" id="mobile-enabled">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                <div class="platform-card" data-platform="unicom">
                    <div class="platform-header">
                        <span class="platform-icon">📞</span>
                        <span class="platform-name">中国联通</span>
                    </div>
                    <div class="platform-status">
                        <label class="toggle-switch">
                            <input type="checkbox" id="unicom-enabled">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                <div class="platform-card" data-platform="telecom">
                    <div class="platform-header">
                        <span class="platform-icon">🌐</span>
                        <span class="platform-name">中国电信</span>
                    </div>
                    <div class="platform-status">
                        <label class="toggle-switch">
                            <input type="checkbox" id="telecom-enabled">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                <div class="platform-card" data-platform="jd">
                    <div class="platform-header">
                        <span class="platform-icon">🛒</span>
                        <span class="platform-name">京东</span>
                    </div>
                    <div class="platform-status">
                        <label class="toggle-switch">
                            <input type="checkbox" id="jd-enabled">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                <div class="platform-card" data-platform="taobao">
                    <div class="platform-header">
                        <span class="platform-icon">🛍️</span>
                        <span class="platform-name">淘宝</span>
                    </div>
                    <div class="platform-status">
                        <label class="toggle-switch">
                            <input type="checkbox" id="taobao-enabled">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                <div class="platform-card" data-platform="pdd">
                    <div class="platform-header">
                        <span class="platform-icon">🎯</span>
                        <span class="platform-name">拼多多</span>
                    </div>
                    <div class="platform-status">
                        <label class="toggle-switch">
                            <input type="checkbox" id="pdd-enabled">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- 通用设置 -->
        <div class="settings-section">
            <div class="section-title">通用设置</div>

            <div class="setting-item">
                <div class="setting-label">
                    <div class="setting-name">启用通知</div>
                    <div class="setting-description">在浏览器中显示福利活动通知</div>
                </div>
                <div class="setting-control">
                    <label class="toggle-switch">
                        <input type="checkbox" id="notification-enabled" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="setting-item">
                <div class="setting-label">
                    <div class="setting-name">自动填充表单</div>
                    <div class="setting-description">检测表单时显示自动填充按钮</div>
                </div>
                <div class="setting-control">
                    <label class="toggle-switch">
                        <input type="checkbox" id="autofill-enabled" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="setting-item">
                <div class="setting-label">
                    <div class="setting-name">声音提醒</div>
                    <div class="setting-description">新福利时播放提醒声音</div>
                </div>
                <div class="setting-control">
                    <label class="toggle-switch">
                        <input type="checkbox" id="sound-enabled">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <!-- 用户信息 -->
        <div class="settings-section">
            <div class="section-title">用户信息</div>
            <div class="user-info">
                <form id="userForm">
                    <div class="form-group">
                        <label for="userName">姓名</label>
                        <input type="text" id="userName" name="userName" placeholder="请输入您的姓名">
                    </div>
                    <div class="form-group">
                        <label for="userPhone">手机号</label>
                        <input type="tel" id="userPhone" name="userPhone" placeholder="请输入您的手机号">
                    </div>
                    <div class="form-group">
                        <label for="userIdCard">身份证号</label>
                        <input type="text" id="userIdCard" name="userIdCard" placeholder="请输入您的身份证号">
                    </div>
                    <div class="form-group">
                        <label for="userAddress">收货地址</label>
                        <input type="text" id="userAddress" name="userAddress" placeholder="请输入您的收货地址">
                    </div>
                    <div class="encryption-notice">
                        🔒 您的所有个人信息都经过AES-256加密存储，仅存储在本地，不会上传到任何服务器。
                    </div>
                    <div style="margin-top: 15px;">
                        <button type="submit" class="btn">保存用户信息</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 数据管理 -->
        <div class="settings-section">
            <div class="section-title">数据管理</div>
            <div class="setting-item">
                <div class="setting-label">
                    <div class="setting-name">清除所有数据</div>
                    <div class="setting-description">删除所有配置、记录和用户信息</div>
                </div>
                <div class="setting-control">
                    <button class="btn btn-danger" onclick="clearAllData()">清除数据</button>
                </div>
            </div>
            <div class="setting-item">
                <div class="setting-label">
                    <div class="setting-name">导出数据</div>
                    <div class="setting-description">导出您的配置和记录到文件</div>
                </div>
                <div class="setting-control">
                    <button class="btn" onclick="exportData()">导出数据</button>
                </div>
            </div>
        </div>

        <div class="footer">
            福利助手 v0.1.0 | 合规福利获取助手 | 遵守各平台服务条款
        </div>
    </div>

    <script src="settings.js"></script>
</body>
</html>
